<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Modular - Demo Interna</title>
    <link rel="stylesheet" href="estilos.css">
</head>
<body>
    <main class="container">
        <header>
            <h1>Calculadora Modular</h1>
            <p>Introduce los valores y selecciona la operación para realizar el cálculo.</p>
        </header>

        <form action="#" method="GET" id="calc-form">
            <div class="input-group">
                <label for="num1">Primer Número:</label>
                <input type="number" id="num1" name="num1" placeholder="Ej: 10" required>
            </div>

            <div class="input-group">
                <label for="num2">Segundo Número:</label>
                <input type="number" id="num2" name="num2" placeholder="Ej: 5" required>
            </div>

            <div id="resultado-container" class="result-box">
                <span>Resultado: </span>
                <strong id="display-resultado">--</strong>
            </div>

            <fieldset>
                <legend>Operación a realizar:</legend>
                <div class="radio-group">
                    <label>
                        <input type="radio" name="operacion" value="sumar" checked> Sumar
                    </label>
                    <label>
                        <input type="radio" name="operacion" value="restar"> Restar
                    </label>
                    <label>
                        <input type="radio" name="operacion" value="multiplicar"> Multiplicar
                    </label>
                    <label>
                        <input type="radio" name="operacion" value="dividir"> Dividir
                    </label>
                </div>
            </fieldset>

            <button type="submit" id="btn-calcular">Calcular</button>
        </form>
    </main>

    <script src="script.js"></script>
</body>
</html>
